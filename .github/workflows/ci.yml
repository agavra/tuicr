name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    needs: [check, fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  test:
    name: Test
    needs: [check, fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Mercurial (if missing)
        run: command -v hg || (sudo apt-get update && sudo apt-get install -y mercurial)
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install Jujutsu (if missing)
        run: command -v jj || cargo binstall --strategies crate-meta-data jj-cli --no-confirm
      - run: cargo test

  update-test:
    name: Update command (${{ matrix.os }})
    needs: [check, fmt]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test manager and direct upgrade/rollback matrix
        run: cargo test 'update::'
      - name: Test live direct upgrade and rollback
        shell: bash
        env:
          ROLLBACK_VERSION: 0.19.0
        run: |
          set -euo pipefail
          extension=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            extension=".exe"
          fi

          cargo build --bin tuicr
          rollback_candidate="$RUNNER_TEMP/tuicr-rollback-candidate$extension"
          cp "target/debug/tuicr$extension" "$rollback_candidate"

          # Use separate candidates because v0.19.0 predates `tuicr update`.
          cp Cargo.toml "$RUNNER_TEMP/tuicr-Cargo.toml"
          cp Cargo.lock "$RUNNER_TEMP/tuicr-Cargo.lock"
          trap 'cp "$RUNNER_TEMP/tuicr-Cargo.toml" Cargo.toml; cp "$RUNNER_TEMP/tuicr-Cargo.lock" Cargo.lock' EXIT
          python - <<'PY'
          from pathlib import Path
          import re

          manifest = Path("Cargo.toml")
          updated, count = re.subn(
              r'(?m)^version = "[^"]+"$',
              'version = "0.0.0"',
              manifest.read_text(),
              count=1,
          )
          if count != 1:
              raise SystemExit("could not set the test package version")
          manifest.write_text(updated)
          PY
          cargo build --bin tuicr
          upgrade_candidate="$RUNNER_TEMP/tuicr-upgrade-candidate$extension"
          cp "target/debug/tuicr$extension" "$upgrade_candidate"
          cp "$RUNNER_TEMP/tuicr-Cargo.toml" Cargo.toml
          cp "$RUNNER_TEMP/tuicr-Cargo.lock" Cargo.lock

          test "$("$upgrade_candidate" --version)" = "tuicr 0.0.0"
          "$upgrade_candidate" update
          test "$("$upgrade_candidate" --version)" != "tuicr 0.0.0"

          "$rollback_candidate" update "$ROLLBACK_VERSION"
          test "$("$rollback_candidate" --version)" = "tuicr $ROLLBACK_VERSION"
          test -z "$(find "$RUNNER_TEMP" -maxdepth 1 -name '.tuicr-update-*' -print)"
